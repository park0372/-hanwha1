<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공사팀 Daily Report 대시보드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (xlsx) for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen font-sans text-gray-800">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🏗️</span>
                <h1 class="text-xl font-bold text-slate-800">현장 공사팀 Daily Report 대시보드</h1>
            </div>
            <div class="flex items-center space-x-3">
                <span id="current-date" class="text-sm bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg font-medium border border-blue-100"></span>
                <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition flex items-center space-x-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span>엑셀 다운로드</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container mx-auto px-6 py-8 max-w-6xl">
        
        <!-- 입력 폼 섹션 -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-8">
            <h2 class="text-lg font-bold mb-4 text-slate-800 flex items-center space-x-2">
                <span class="w-2 h-2 bg-blue-600 rounded-full"></span>
                <span>오늘의 작업일보 작성</span>
            </h2>
            <form id="report-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">작업 일자</label>
                    <input type="date" id="rep-date" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">공종 (Work Category)</label>
                    <input type="text" id="rep-category" placeholder="예: 토공사, 골조공사 등" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">날씨 및 현장 상태</label>
                    <input type="text" id="rep-weather" placeholder="예: 맑음 / 38°C" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition" required>
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">주요 작업 내용 및 실적</label>
                    <textarea id="rep-content" rows="3" placeholder="오늘 진행된 주요 작업 내용을 입력하세요." class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition" required></textarea>
                </div>
                <div class="md:col-span-3 flex justify-end">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium shadow-sm transition">
                        리포트 추가하기
                    </button>
                </div>
            </form>
        </section>

        <!-- 리포트 목록 섹션 -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800 flex items-center space-x-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                    <span>작업일보 현황 목록</span>
                </h2>
                <span id="report-count" class="text-xs text-gray-500 font-medium bg-gray-100 px-2.5 py-1 rounded-full">총 0건</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-xs uppercase tracking-wider border-b border-gray-200">
                            <th class="p-3.5 font-semibold">날짜</th>
                            <th class="p-3.5 font-semibold">공종</th>
                            <th class="p-3.5 font-semibold">날씨</th>
                            <th class="p-3.5 font-semibold">주요 작업 내용</th>
                            <th class="p-3.5 font-semibold text-center w-20">관리</th>
                        </tr>
                    </thead>
                    <tbody id="report-table-body" class="text-sm divide-y divide-gray-100">
                        <!-- 데이터 동적 추가 -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Script -->
    <script>
        document.getElementById('current-date').innerText = new Date().toISOString().slice(0, 10);
        document.getElementById('rep-date').value = new Date().toISOString().slice(0, 10);

        const form = document.getElementById('report-form');
        const tableBody = document.getElementById('report-table-body');
        const reportCount = document.getElementById('report-count');

        let reports = JSON.parse(localStorage.getItem('daily_reports')) || [];

        function renderReports() {
            tableBody.innerHTML = '';
            reportCount.innerText = `총 ${reports.length}건`;
            
            if (reports.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-400 text-sm">등록된 리포트가 없습니다. 위 폼을 통해 일보를 추가해보세요.</td></tr>`;
                return;
            }
            
            reports.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50/85 transition';
                row.innerHTML = `
                    <td class="p-3.5 text-gray-600 font-medium whitespace-nowrap">${item.date}</td>
                    <td class="p-3.5 text-blue-600 font-semibold whitespace-nowrap">${item.category}</td>
                    <td class="p-3.5 text-gray-600 whitespace-nowrap">${item.weather}</td>
                    <td class="p-3.5 text-gray-700 max-w-md truncate">${item.content}</td>
                    <td class="p-3.5 text-center">
                        <button onclick="deleteReport(${index})" class="text-gray-400 hover:text-red-600 p-1 rounded transition" title="삭제">
                            <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1.e 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newReport = {
                date: document.getElementById('rep-date').value,
                category: document.getElementById('rep-category').value,
                weather: document.getElementById('rep-weather').value,
                content: document.getElementById('rep-content').value
            };
            reports.unshift(newReport);
            localStorage.setItem('daily_reports', JSON.stringify(reports));
            renderReports();
            form.reset();
            document.getElementById('rep-date').value = new Date().toISOString().slice(0, 10);
        });

        function deleteReport(index) {
            if (confirm('해당 리포트를 삭제하시겠습니까?')) {
                reports.splice(index, 1);
                localStorage.setItem('daily_reports', JSON.stringify(reports));
                renderReports();
            }
        }

        // 엑셀 다운로드 함수 (SheetJS 활용)
        function exportToExcel() {
            if (reports.length === 0) {
                alert('다운로드할 데이터가 없습니다.');
                return;
            }
            const dataToExport = reports.map((item, idx) => ({
                '번호': reports.length - idx,
                '작업일자': item.date,
                '공종': item.category,
                '날씨/현장상태': item.weather,
                '주요 작업 내용': item.content
            }));

            const worksheet = XLSX.utils.json_to_sheet(dataToExport);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Daily Reports");
            
            // 파일 다운로드 실행
            XLSX.writeFile(workbook, `Daily_Report_${new Date().toISOString().slice(0, 10)}.xlsx`);
        }

        renderReports();
    </script>
</body>
</html>
