<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부대토목현장 Daily Progress Report 대시보드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 via-sky-50 to-indigo-50 min-h-screen text-slate-800 pb-16">

    <!-- Top Header -->
    <header class="bg-slate-900 text-white shadow-xl sticky top-0 z-30 border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-500/30">
                    <span class="text-2xl">🚧</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">부대토목현장 Daily Progress Report</h1>
                    <p class="text-xs text-slate-400">Site Daily Management & Progress Dashboard</p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <div class="bg-slate-800 px-3.5 py-2 rounded-lg border border-slate-700 text-xs font-medium text-slate-200">
                    📅 <span id="header-date-display"></span>
                </div>
                <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-lg shadow-emerald-600/20 transition flex items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span>엑셀 다운로드</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">
        
        <!-- 현장 기본 정보 & 날씨/기온 -->
        <section class="bg-white/80 backdrop-blur-md rounded-2xl shadow-sm border border-slate-200/80 p-6">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center space-x-2">
                <span class="w-2 h-2 bg-blue-600 rounded-full"></span>
                <span>현장 기상 및 기본 개요</span>
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">보고 일자 (Date)</label>
                    <input type="date" id="rep-date" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition font-medium">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">오전/오후 날씨 (Weather)</label>
                    <input type="text" id="rep-weather" placeholder="예: A.M. 맑음 / P.M. 구름" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">기온 (Temperature)</label>
                    <input type="text" id="rep-temp" placeholder="예: 최저 23℃ / 최고 35℃" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">시공사 / 감리단 (Contractor)</label>
                    <input type="text" id="rep-company" placeholder="예: 00건설 / 00엔지니어링" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                </div>
            </div>
        </section>

        <!-- 부대토목 공종별 실적 입력 폼 -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <h2 class="text-base font-bold text-slate-800 mb-5 flex items-center space-x-2 border-b pb-3">
                <span class="w-2.5 h-2.5 bg-indigo-600 rounded-full"></span>
                <span>부대토목 공종별 물량 및 실적 등록</span>
            </h2>
            <form id="report-form" class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                <div class="md:col-span-3">
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">부대토목 공종 분류</label>
                    <select id="rep-category" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white transition">
                        <option>Earth Work (토공사 / 터파기·성토)</option>
                        <option>Drainage Work (우오수 관로 및 배수시설공)</option>
                        <option>Pavement Work (포장공 / 아스팔트·콘크리트)</option>
                        <option>Structure Work (옹벽·맨홀 및 구조물공)</option>
                        <option>Landscape Work (조경 및 부대시설공)</option>
                        <option>Utility Work (기타 지하매설물 및 유틸리티)</option>
                    </select>
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">세부 작업 위치 및 항목</label>
                    <input type="text" id="rep-desc" placeholder="예: 진입도로 구간 우수관로 터파기" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white transition" required>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">금일 실적 (Today)</label>
                    <input type="number" step="0.01" id="rep-today" placeholder="숫자 입력" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white transition" required>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-slate-600 mb-1.5">단위 (Unit)</label>
                    <input type="text" id="rep-unit" placeholder="예: m, m3, ton, ea" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white transition" required>
                </div>
                <div class="md:col-span-2">
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl text-sm shadow-md shadow-indigo-600/20 transition flex items-center justify-center space-x-1">
                        <span>+ 항목 추가</span>
                    </button>
                </div>
            </form>
        </section>

        <!-- 공정률 및 현장 특이사항 (Note & Tomorrow) -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col justify-between">
                <h2 class="text-base font-bold text-slate-800 mb-4 border-b pb-3 flex items-center space-x-2">
                    <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></span>
                    <span>종합 공정률 현황 (Progress Rates)</span>
                </h2>
                <div class="space-y-5 my-auto">
                    <div>
                        <div class="flex justify-between text-sm mb-1.5"><span class="font-semibold text-slate-600">계획 공정률 (Plan)</span><span class="font-bold text-slate-700">72.5%</span></div>
                        <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden"><div class="bg-slate-400 h-3 rounded-full" style="width: 72.5%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-sm mb-1.5"><span class="font-semibold text-slate-600">실행 공정률 (Achieved)</span><span class="font-bold text-emerald-600">68.4%</span></div>
                        <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden"><div class="bg-emerald-500 h-3 rounded-full" style="width: 68.4%"></div></div>
                    </div>
                </div>
            </section>

            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col">
                <h2 class="text-base font-bold text-slate-800 mb-4 border-b pb-3 flex items-center space-x-2">
                    <span class="w-2.5 h-2.5 bg-amber-500 rounded-full"></span>
                    <span>특이사항 및 익일 작업계획 (Note of the Site)</span>
                </h2>
                <textarea id="site-note" rows="4" placeholder="• 특이사항: 자재 반입 지연 등&#10;• 명일 계획: 우수관로 부설 및 되메우기 계속" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3.5 text-sm resize-none focus:ring-2 focus:ring-amber-500 focus:bg-white transition flex-grow"></textarea>
            </section>
        </div>

        <!-- 실적 리포트 테이블 목록 -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 bg-slate-50/50 border-b border-slate-200 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <span class="w-2.5 h-2.5 bg-blue-600 rounded-full"></span>
                    <h2 class="text-base font-bold text-slate-800">금일 부대토목 공사 세부 실적 목록</h2>
                </div>
                <span id="report-count" class="text-xs font-semibold text-slate-600 bg-white border border-slate-200 px-3 py-1.5 rounded-full shadow-xs">총 0건</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100/70 text-slate-600 text-xs uppercase tracking-wider border-b border-slate-200">
                            <th class="p-4 font-semibold">보고 날짜</th>
                            <th class="p-4 font-semibold">공종 분류</th>
                            <th class="p-4 font-semibold">세부 작업 항목 및 위치</th>
                            <th class="p-4 font-semibold">금일 실적</th>
                            <th class="p-4 font-semibold">단위</th>
                            <th class="p-4 font-semibold text-center w-20">관리</th>
                        </tr>
                    </thead>
                    <tbody id="report-table-body" class="text-sm divide-y divide-slate-100">
                        <!-- 동적 렌더링 -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Script Logic -->
    <script>
        const todayStr = new Date().toISOString().slice(0, 10);
        document.getElementById('rep-date').value = todayStr;
        document.getElementById('header-date-display').innerText = todayStr;

        const form = document.getElementById('report-form');
        const tableBody = document.getElementById('report-table-body');
        const reportCount = document.getElementById('report-count');

        let reports = JSON.parse(localStorage.getItem('civil_site_reports')) || [];

        function renderReports() {
            tableBody.innerHTML = '';
            reportCount.innerText = `총 ${reports.length}건`;
            
            if (reports.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-slate-400 text-sm">등록된 부대토목 일보 데이터가 없습니다. 위 폼을 통해 입력해주세요.</td></tr>`;
                return;
            }
            
            reports.forEach((item, index) => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-slate-50/80 transition';
                row.innerHTML = `
                    <td class="p-4 text-slate-600 whitespace-nowrap font-medium">${item.date}</td>
                    <td class="p-4 text-indigo-600 font-semibold whitespace-nowrap">${item.category}</td>
                    <td class="p-4 text-slate-800">${item.desc}</td>
                    <td class="p-4 font-bold text-slate-700">${item.today}</td>
                    <td class="p-4 text-slate-500">${item.unit}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteReport(${index})" class="text-slate-400 hover:text-red-600 p-1.5 rounded-lg hover:bg-red-50 transition" title="삭제">
                            <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newReport = {
                date: document.getElementById('rep-date').value,
                category: document.getElementById('rep-category').value,
                desc: document.getElementById('rep-desc').value,
                today: document.getElementById('rep-today').value,
                unit: document.getElementById('rep-unit').value
            };
            reports.unshift(newReport);
            localStorage.setItem('civil_site_reports', JSON.stringify(reports));
            renderReports();
            document.getElementById('rep-desc').value = '';
            document.getElementById('rep-today').value = '';
            document.getElementById('rep-unit').value = '';
        });

        function deleteReport(index) {
            if (confirm('해당 일보 항목을 삭제하시겠습니까?')) {
                reports.splice(index, 1);
                localStorage.setItem('civil_site_reports', JSON.stringify(reports));
                renderReports();
            }
        }

        function exportToExcel() {
            if (reports.length === 0) {
                alert('다운로드할 데이터가 없습니다.');
                return;
            }
            const dataToExport = reports.map((item, idx) => ({
                '번호': reports.length - idx,
                '보고날짜': item.date,
                '공종분류': item.category,
                '세부작업항목': item.desc,
                '금일실적': item.today,
                '단위': item.unit
            }));

            const worksheet = XLSX.utils.json_to_sheet(dataToExport);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Civil_Daily_Report");
            XLSX.writeFile(workbook, `Civil_Daily_Report_${new Date().toISOString().slice(0, 10)}.xlsx`);
        }

        renderReports();
    </script>
</body>
</html>
